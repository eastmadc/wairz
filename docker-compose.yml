services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wairz
      POSTGRES_PASSWORD: wairz
      POSTGRES_DB: wairz
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wairz"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    # Host requires: sysctl vm.overcommit_memory=1 (for Redis background saves)
    sysctls:
      net.core.somaxconn: 511
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      additional_contexts:
        kernels: ./emulation/kernels
      args:
        DOCKER_GID: "${DOCKER_GID:-999}"
    restart: unless-stopped
    ports:
      # Default binds to 127.0.0.1 to prevent LAN exposure of the
      # unauthenticated /ws WebSocket endpoint. Override via
      # BACKEND_HOST_BIND=0.0.0.0 only after auth is hardened.
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://wairz:wairz@postgres:5432/wairz
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/firmware
      GHIDRA_INSTALL_DIR: /opt/ghidra
      GHIDRA_SCRIPTS_PATH: /opt/ghidra_scripts
      EMULATION_IMAGE: wairz-emulation
      EMULATION_NETWORK: wairz_emulation_net
      FUZZING_IMAGE: wairz-fuzzing
      SYSTEM_EMULATION_IMAGE: wairz-system-emulation
      UART_BRIDGE_HOST: host.docker.internal
      UART_BRIDGE_PORT: "9999"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - firmware_data:/data/firmware
      - kernel_vulns_data:/data/kernel-vulns
      - ./ghidra/scripts:/opt/ghidra_scripts:ro
      - ./emulation/kernels:/opt/kernels:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/wairz-dumps:/tmp/wairz-dumps
    networks:
      - default
      - emulation_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4096M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      additional_contexts:
        kernels: ./emulation/kernels
      args:
        DOCKER_GID: "${DOCKER_GID:-999}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://wairz:wairz@postgres:5432/wairz
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /data/firmware
      GHIDRA_INSTALL_DIR: /opt/ghidra
      GHIDRA_SCRIPTS_PATH: /opt/ghidra_scripts
      EMULATION_IMAGE: wairz-emulation
      EMULATION_NETWORK: wairz_emulation_net
      FUZZING_IMAGE: wairz-fuzzing
      SYSTEM_EMULATION_IMAGE: wairz-system-emulation
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - firmware_data:/data/firmware
      - kernel_vulns_data:/data/kernel-vulns
      - ./ghidra/scripts:/opt/ghidra_scripts:ro
      - ./emulation/kernels:/opt/kernels:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/wairz-dumps:/tmp/wairz-dumps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["sh", "-c", ".venv/bin/python -m alembic upgrade head && exec .venv/bin/arq app.workers.arq_worker.WorkerSettings"]
    deploy:
      resources:
        limits:
          memory: 4096M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  emulation:
    profiles: ["build"]
    build:
      context: ./emulation
      dockerfile: Dockerfile
    image: wairz-emulation
    volumes:
      - firmware_data:/data/firmware:ro
      - ./emulation/kernels:/opt/kernels:ro
    networks:
      - emulation_net
    deploy:
      resources:
        limits:
          memory: 1024M
          pids: 256

  fuzzing:
    profiles: ["build"]
    build:
      context: ./fuzzing
      dockerfile: Dockerfile
    image: wairz-fuzzing
    volumes:
      - firmware_data:/data/firmware:ro
    deploy:
      resources:
        limits:
          memory: 2048M
          pids: 256

  system-emulation:
    profiles: ["build"]
    build:
      context: ./system-emulation
      dockerfile: Dockerfile
    image: wairz-system-emulation
    privileged: true
    ports:
      - "5000"
    volumes:
      - firmware_data:/firmwares:ro
    networks:
      - emulation_net
    environment:
      - POSTGRES_PASSWORD=firmae
    deploy:
      resources:
        limits:
          memory: 2048M
          pids: 512
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  vulhunt:
    image: ghcr.io/vulhunt-re/vulhunt:latest
    restart: unless-stopped
    entrypoint: ["vulhunt-ce", "mcp", "--host", "0.0.0.0", "--port", "8080"]
    volumes:
      - firmware_data:/data/firmware:ro
    deploy:
      resources:
        limits:
          memory: 4096M
          pids: 256
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  clamav:
    image: clamav/clamav:latest
    profiles: ["clamav"]
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
      - firmware_data:/data/firmware:ro
    deploy:
      resources:
        limits:
          memory: 4096M
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_BIND:-127.0.0.1}:${FRONTEND_HOST_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  redisdata:
  firmware_data:
  kernel_vulns_data:
  clamav-db:

networks:
  emulation_net:
    name: wairz_emulation_net
    external: true
  default:
    driver: bridge
