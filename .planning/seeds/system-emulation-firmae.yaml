    type: string
    required: true
  - name: nvram_state
    type: object
    required: true
  - name: kernel_used
    type: string
    required: true
  - name: error_message
    type: string
    required: true
  - name: mode
    type: string
    required: true
  - name: idle_since
    type: string
    required: true
