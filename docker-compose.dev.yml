# Development overrides — hot-reload for backend and frontend.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Or set COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml

services:
  backend:
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
    command: []
    environment:
      WAIRZ_DEV_MODE: "true"
    # Override entrypoint to use --reload for uvicorn.
    # The entrypoint.sh handles Docker socket GID fix, then we override the exec.
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Fix Docker socket GID (same as production entrypoint)
        if [ -S /var/run/docker.sock ]; then
          SOCK_GID=$$(stat -c %g /var/run/docker.sock)
          CUR_GID=$$(getent group docker 2>/dev/null | cut -d: -f3)
          if [ -n "$$SOCK_GID" ] && [ "$$SOCK_GID" != "$${CUR_GID:-}" ]; then
            groupmod -g "$$SOCK_GID" docker 2>/dev/null || groupadd -g "$$SOCK_GID" docker 2>/dev/null || true
            usermod -aG docker wairz 2>/dev/null || true
          fi
        fi
        exec su -s /bin/sh wairz -c '.venv/bin/python -m alembic upgrade head && .venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app'

  worker:
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
