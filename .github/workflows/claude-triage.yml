name: Claude Triage
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  triage:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude Triage
        run: echo "Claude triage triggered — configure with ANTHROPIC_API_KEY secret"
