- name: user_experience
  weight: 0.15
exit_conditions:
- name: acceptance_test_pass
  criteria: OpenWrt ARM + OpenWrt MIPS + DD-WRT MIPSel all reach running state with
    at least one discoverable network service each
- name: web_ui_reachable
  criteria: Frontend generates a clickable link that opens the firmware HTTP interface
- name: terminal_accessible
  criteria: User can open xterm.js widget and get interactive shell on running firmware
- name: mcp_tools_functional
  criteria: All 8 system emulation MCP tools return valid output against running session
- name: timeout_enforcement
  criteria: Hanging pipeline force-killed at 10min, idle session cleaned at 30min
