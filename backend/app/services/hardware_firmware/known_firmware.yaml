  # MediaTek WLAN firmware (mt76xx / mt79xx)
  - name: MediaTek WLAN firmware OOB (CVE-2024-20040)
    vendor: mediatek
    category: wifi
    chipset_regex: "(?i)^mt(6768|6761|6762|6580|6833|6853|6781|6873|6875|6877|6883|6885|6889|6891|6893|6789|6855|6879|6886|6890|6895|6983|6985|7902|7915|7916|8195|8797)$"
    cves:
      - CVE-2024-20040
    severity: high
    cvss_score: 8.8
    notes: |
      ASB April 2024 / M-ALPS08360153 + M-WCNCR00363530.  OOB write in
      WLAN firmware blob (wifi_ram_code, mt7915_*).  Adjacent-network
      attacker → RCE on chip.  Genuine firmware-side bug (not driver).

  # MediaTek MT79xx Bluetooth firmware
  - name: MediaTek MT79xx Bluetooth heap overflow (CVE-2025-20672)
    vendor: mediatek
    category: bluetooth
    chipset_regex: "(?i)^mt(7902|7921|7922|7925|7927)$"
    version_regex: "^([0-2]\\.|3\\.[0-5])"
    cves:
      - CVE-2025-20672
    severity: critical
    cvss_score: 9.8
    notes: |
      M-WCNCR00412257.  Heap overflow in BT firmware <=3.6 on MT792x/
      MT79xx family.  Critical, user-exec privileges, adjacent BT
      attacker.  Wide deployment in laptops + Android tablets.

