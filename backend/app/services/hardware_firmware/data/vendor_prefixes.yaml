# Vendor prefixes — display names + aliases.
#
# Sourced from Wairz's hardware firmware VENDORS set plus a slimmed extract of
# the Linux kernel's Documentation/devicetree/bindings/vendor-prefixes.yaml.
# First-match-wins lookups use the `prefix` field (lowercase canonical name).
# Aliases are alternate lowercase tokens that map to the same canonical prefix.
#
# License note: DT vendor-prefixes.yaml upstream is GPL-2.0 OR BSD-2-Clause.
# Display names are short, factual corporate names — no trademarks asserted.
#
# Keep this list tight (~150-250 entries).  Add new prefixes only when a
# matching firmware_patterns.yaml entry references them, or when a blob
# clearly originates from the vendor but has no pattern match yet.

vendors:
