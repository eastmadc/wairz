  # These entries will fire on every modem blob; acceptable noise vs
  # missing 20+ CVEs entirely.  Future modem chipset extraction lands
  # via a dedicated mtk_modem parser.
  - name: MediaTek modem CDMA PPP RCE (CVE-2023-20819)
    vendor: mediatek
    category: modem
    cves:
