name: Firmware Security Scan
on:
  workflow_dispatch:
    inputs:
      firmware-url:
        description: 'URL to firmware image'
        required: true
      fail-on:
        description: 'Fail threshold: critical|high|medium|cvss:N.N|none'
        required: false
        default: 'high'
      format:
        description: 'Output format: json, markdown, sarif, vex'
        required: false
        default: 'sarif'
      skip-phases:
        description: 'Comma-separated phases to skip (e.g. compliance,android)'
        required: false
        default: ''
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required for SARIF upload
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        run: wget -q -O firmware.bin "${{ github.event.inputs.firmware-url }}"

      - name: Scan firmware
        id: scan
        uses: ./.github/actions/firmware-scan
        with:
          firmware-path: firmware.bin
          fail-on: ${{ github.event.inputs.fail-on }}
          format: ${{ github.event.inputs.format }}
          skip-phases: ${{ github.event.inputs.skip-phases }}
          timeout: '900'

      - name: Report results
        if: always()
        run: |
          echo "## Scan Result: ${{ steps.scan.outputs.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | ${{ steps.scan.outputs.findings-critical }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High | ${{ steps.scan.outputs.findings-high }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total | ${{ steps.scan.outputs.findings-total }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Report: \`${{ steps.scan.outputs.report-path }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-scan-report
          path: ${{ steps.scan.outputs.report-path }}
