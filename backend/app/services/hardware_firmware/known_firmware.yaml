      ASB / M-ALPS07460390.  RPMB logic error → OOB write.  LPE from
      system-uid.  Pre-2022 TEE TAs — lives in tee.img / kinibi blobs.

  # MD1 modem firmware — chipset_regex omitted because mtk_lk parser
