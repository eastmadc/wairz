# Firmware filename patterns → vendor/category/product classification.
#
# Schema (per entry, ordered, first-match-wins):
#   pattern:    Python regex applied to the lowercased basename (not full path)
#   vendor:     Canonical vendor prefix (must exist in vendor_prefixes.yaml)
#   category:   One of classifier.CATEGORIES (wifi|modem|bluetooth|gpu|dsp|camera|
#                 audio|sensor|touchpad|nfc|usb|display|fingerprint|dtb|
#                 kernel_module|bootloader|tee|other)
#   product:    Optional human-readable product name (stored in metadata_.product)
#   confidence: high | medium | low (affects downstream CVE match weighting)
#   source:     Optional attribution (WHENCE, LineageOS device tree, vendor driver)
#   format:     Optional format override (defaults to raw_bin).  Must be in
#                 classifier.FORMATS.
#
# Authoring notes:
# - Patterns are applied to the lowercased filename.  Use lowercase in regex.
# - Escape dots (`\\.`) — default re flags are 0.
# - Prefer anchored patterns (`^…$`) so foo_bar.bin.sig does not match foo_bar.bin.
# - When multiple patterns could match, order them most-specific → least-specific.

patterns:
  # =====================================================================
  # Awinic — Smart PA audio amplifier (ACF + boot firmware)
  # =====================================================================
  - pattern: "^aw88[0-9a-z]+_acf\\.bin$"
    vendor: awinic
    product: "AW88xxx Smart PA acoustic calibration file"
    category: audio
    confidence: high
    format: awinic_acf
    source: awinic-driver/aw883xx_patch
  - pattern: "^aw88[0-9a-z]+_fw[_a-z0-9]*\\.bin$"
    vendor: awinic
    product: "AW88xxx Smart PA boot firmware"
    category: audio
    confidence: high
    source: awinic-driver
  - pattern: "^aw88[0-9a-z]+[_.][a-z0-9._-]+\\.bin$"
    vendor: awinic
    product: "AW88xxx Smart PA firmware/calibration blob"
    category: audio
    confidence: medium
    source: awinic-driver

