  - name: MediaTek RPMB OOB write (CVE-2022-32599)
    vendor: mediatek
    category: tee
    chipset_regex: "(?i)^mt(6580|6731|6735|6737|6739|6753|6757|6761|6763|6765|6768|6769|6771|6779|6781|6785|6789|6833|6853|6855|6873|6875|6877|6879|6883|6885|6889|6891|6893)$"
