  # ===================================================================
  # MediaTek subsystem coverage — sourced 2026-04-17 from Android
  # Security Bulletin (CC-BY 2.5) and NVD (public domain).  See
  # .planning/knowledge/handoff-2026-04-17-mtk-phase-c.md and the deep-
  # research report from the same session for per-CVE provenance.
  #
  # MediaTek PSB pages (corp.mediatek.com) are NOT scraped per ToS;
  # ALPS / WCNCR / MOLY patch IDs reproduced as factual cross-reference
  # only.  Severity / chipset_regex / version_regex driven by ASB+NVD.
  # ===================================================================

  # SCP (System Control Processor) — Cortex-M4 system controller.
  # Chipset_target populated by mtk_tinysys parser from platform_tree
  # (e.g. project/CM4_A/mt6771/) or board_tag (aiot8788ep1 → mt8788).
  - name: MediaTek SCP OOB write (CVE-2025-20668)
    vendor: mediatek
    category: mcu
    chipset_regex: "(?i)^mt(6897|6878|6989|8796|8775|6991|6899)$"
    cves:
      - CVE-2025-20668
    severity: high
    cvss_score: 7.8
    notes: |
      ASB Sept 2025 / M-ALPS09625562.  OOB write in SCP firmware, LPE
      from system-uid.  Dimensity 8400/9300/9400-class chipsets.  No
      clean version threshold disclosed -- treat any matching chipset
      as advisory; pair with parser_version_pin once banner extraction
      lands (research notes scp.img carries v\d+\.\d+\.\d+ banners).

  # tinysys IPC layer — umbrella covering SCP/SSPM/MCUPM message dispatch
  - name: MediaTek tinysys IPI OOB write (CVE-2023-20621)
    vendor: mediatek
    category: mcu
    chipset_regex: "(?i)^mt(6739|6761|6762|6765|6771|6789|6879|6883|6885|6893|6895|6983)$"
    cves:
      - CVE-2023-20621
    severity: medium
    cvss_score: 6.7
    notes: |
      ASB March 2023 / M-ALPS07664755.  OOB write in tinysys IPI handler
      shared by SCP / SSPM / MCUPM message dispatch.  LPE.  Pre-March-
      2023 builds vulnerable; no extractable banner — chipset advisory.

  # SSPM / SPMFW / MCUPM / DPM advisory — no standalone CVEs found,
  # but the tinysys IPC surface above covers their attack path.  This
  # entry fires on every Cortex-M power-management blob to surface
  # presence + recommend up-to-date BSP build.  Empty cves[] → emits
  # an ADVISORY-* row per the matcher convention.  Name kept short
  # because cve_id is VARCHAR(20) (ADVISORY- prefix + 11 chars max).
  - name: MTK PM
    vendor: mediatek
    category: mcu
    cves: []
    severity: medium
    cvss_score: 5.0
    notes: |
      MediaTek power-management coprocessor (sspm.img / spmfw.img /
      mcupm.img / dpm.img).  Cortex-M blobs sharing the tinysys IPC
      layer (CVE-2023-20621 surface).  No standalone public CVEs as of
      2026-04 -- treat as advisory: flag presence, recommend up-to-date
      BSP build.  Banner format varies; some carry "MTK_SPM v<N>" in
      the first 4KB.

  # apusys / VPU / MDLA AI-accelerator firmware
  - name: MediaTek apusys OOB write (CVE-2023-32829)
    vendor: mediatek
    category: mcu
    chipset_regex: "(?i)^mt(6879|6886|6891|6895|6896|6983|6985|8137|8139|8188|8195|8390|8395)$"
    cves:
      - CVE-2023-32829
      - CVE-2021-0897
    severity: medium
    cvss_score: 6.7
    notes: |
      ASB / M-ALPS07713478.  Integer overflow → OOB write in apusys
      (AI Processing Unit System).  LPE from system-uid.  Recurring
      class: ALPS06... in 2021, ALPS07... in 2023, multiple fixes.
      apusys.img / mdla.img typical filenames; cam_vpu*.img on older
      SoCs.

  # GenieZone hypervisor — additional CVEs beyond inline CVE-2025-20707.
  # The version_regex below targets pre-3.2.x and pre-2.5 builds; the
  # parser populates blob.version with the GZ_hypervisor banner.
  - name: MediaTek GenieZone double-free (CVE-2023-20664)
    vendor: mediatek
    category: tee
    version_regex: "(?i)geniezone\\s+v?([0-1]\\.|2\\.[0-4])"
    chipset_regex: "(?i)^mt(6580|6735|6737|6765|6785|6889|8168|8185)$"
    cves:
      - CVE-2023-20664
    severity: medium
    cvss_score: 6.7
    notes: |
      ASB / M-ALPS07505952.  Double-free in gz.  LPE.  Pre-2023
      GenieZone builds on older Helio-class SoCs.

  - name: MediaTek GenieZone keyinstall info-disclosure (CVE-2024-20088)
    vendor: mediatek
    category: tee
    chipset_regex: "(?i)^mt(6765|6768|6781|6833|6835|6877|6879|6883|6885|6886|6889|6893|6895|6897|6983|6985|6989|8755|8765|8766|8768|8775|8781|8786|8788|8792|8796)$"
    cves:
      - CVE-2024-20088
    severity: medium
    cvss_score: 4.4
    notes: |
      ASB / M-ALPS08932099.  Missing bounds check in keyinstall TA →
      OOB read, info disclosure.  Local, system-uid required.

